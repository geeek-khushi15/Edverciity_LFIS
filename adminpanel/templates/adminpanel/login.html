<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Learning Flow Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter'], display: ['Sora','Inter'] } } } }</script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #0f172a 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <span class="inline-flex h-16 w-16 rounded-2xl items-center justify-center text-white text-2xl font-extrabold mb-4"
                  style="background:linear-gradient(135deg,#7c5cff,#9a6bff); box-shadow:0 20px 40px -12px rgba(124,92,255,0.6)">LF</span>
            <h1 class="font-display text-2xl font-extrabold text-white">Learning Flow Insights</h1>
            <p class="text-indigo-300 mt-1 text-sm font-medium">Organisation Admin Portal</p>
        </div>

        <!-- Card -->
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-lg font-bold text-white mb-1">Sign in to Admin Panel</h2>
            <p class="text-indigo-200 text-sm mb-6">Access is restricted to Organisation Admins only.</p>

            {% if messages %}
                {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg text-sm font-semibold bg-red-500/20 text-red-200 border border-red-400/30">
                    <i class="bi bi-exclamation-triangle-fill mr-1"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-indigo-200 mb-1.5">Username</label>
                    <input type="text" name="username" required autofocus
                           class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 text-white placeholder-indigo-300 focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-400/30 transition text-sm"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-indigo-200 mb-1.5">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 text-white placeholder-indigo-300 focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-400/30 transition text-sm"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-2.5 rounded-xl font-bold text-white text-sm transition-all hover:brightness-110 active:scale-[0.98]"
                        style="background:linear-gradient(135deg,#7c5cff,#9a6bff); box-shadow:0 10px 24px -8px rgba(124,92,255,0.7)">
                    <i class="bi bi-shield-lock-fill mr-1"></i> Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-indigo-400 mt-6">
            Not an admin? <a href="{% url 'login' %}" class="text-indigo-200 hover:text-white underline">Go to main login</a>
        </p>
    </div>

</body>
</html>
