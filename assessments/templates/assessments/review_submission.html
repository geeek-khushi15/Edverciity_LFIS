{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<section class="max-w-3xl mx-auto rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 p-6 shadow-card">
    <div class="mb-5">
        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white">Review Submission</h2>
        <p class="text-sm text-slate-600 dark:text-slate-300 mt-1">{{ object.assignment.title }} | Student: {{ object.student.username }}</p>
    </div>

    <div class="mb-4 p-4 rounded-xl border border-slate-200 bg-slate-50">
        <a href="{{ object.file_upload.url }}" target="_blank" class="text-sm font-semibold text-primary-700 hover:text-primary-600">Open submitted file</a>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="flex justify-end gap-2 pt-2">
            <a href="{% url 'trainer_assignment_submissions' pk=object.assignment.id %}" class="rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cancel</a>
            <button type="submit" class="rounded-xl btn-gradient text-white px-4 py-2.5 text-sm font-semibold shadow-sm">Save Review</button>
        </div>
    </form>
</section>
{% endblock %}
